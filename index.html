    <style>
        :root {
        /* 共通の色変数 */
        --accent-blue: #617692;
        --transition-speed: 0.5s;
        --primary: #6b7280;
        --primary-light: #6b7280;
        --primary-dark: #586275;
        --primary-bg: #efeef8;
        --text-dark: #1f2937;
        --text-light: #6b7280;
        --bg-page: #f9fafb;
        --bg-card: #ffffff;
        }

        header {
            position: relative;
            padding-top: 20px;
            margin: 10px;
        }

        /* モードごとに変数の値を定義 */
        body.dark {
            --bg-color: #2d2e34;
            --text-color: #ffffff;
        }
        body.light {
            --bg-color: #e0dfec;
            --text-color: #373e59;
        }

        /* 実際に使うときは変数で指定 */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color var(--transition-speed),color var(--transition-speed); /* 切り替えをスムーズにする */
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
        }

        .mode-switch {
            position: absolute;
            top: 5%;
            right: 10%;
        }

        .switch_label {
            /*flexで横並びに。align-itemsで縦方向の中央揃えにする*/
            display: flex;
            align-items: center;
            cursor: pointer;
            width: 116px;
        }

        input[type="checkbox"] {
            /*チェックボックスを左上端に固定してサイズを0にすることで非表示にできる*/
            position: absolute;
            width: 0;
            height: 0;
        }

        .switch {
            /*スイッチの位置。relativeにすると、switch＞circleのtop,leftはswitchからの位置になる。*/
            position: relative;
            display: flex;
            align-items: center;
            width: 116px;
            height: 35px;
        }
        .Mode {
            /*ボタン内の文字をスライドさせる*/
            position: absolute;
            left: 42px;
            font: bold 20px "Yu Gothic",sans-serif;
            letter-spacing: 1px;
            color: #000000;
            z-index: 10;
            transition: 0.5s;
            }

        input:checked ~ .Mode {
            /* activeクラスがついた時（ライトモード時） */
            /* 修正版：inputがチェックされた時の、兄弟要素である.Modeに対して適用(~)する */
            left: 20px;
            color: #ffffff;
            font: bold 20px "Yu Gothic",sans-serif;
            letter-spacing: 1px;
            z-index: 10;
        }

        .base {
            /*土台。width,height=サイズ。border...角の丸*/
            width: 116px;
            border-radius: 21px;
            height: 35px;
            background-color:#ffffff;
            box-shadow: 0 0 6px 1px   #00000070;
        }

        input:checked ~ .base {
            /*チェックされているときの土台の色*/
            background-color: #5c6e9c;
            transition: 0.5s;
            box-shadow: 0 0 6px 1px   #00000070
        }

        .circle {
            /*スイッチの丸。width,height=サイズ。borderはサイズの半分の値。top,left＝位置。*/
            position: absolute;
            top: 5px;
            left: 7px;
            width: 24px;
            height: 24px;
            border-radius: 12px;
            background-color: #373e59;
            transition: 0.5s;
            z-index: 5;
        }

        input:checked ~ .circle {
            /*translateX=右に丸何個(100%=指定px)分動かすか*/
            transform: translateX(320%);
            background-color: #ffffff;
        }

        .logo {
            width: 400px;
            font: bold 24px "Yu Gothic",sans-serif;
            margin: auto;
        }
    </style>

<script>
const checkbox = document.getElementById('switch');
const body = document.body;
const title = document.querySelector(".Mode");

// 初期化：HTMLでbodyにdark/lightがついてなかった時の保険
if (!body.classList.contains('dark') && !body.classList.contains('light')) {
    body.classList.add('dark');
}

checkbox.addEventListener("change", () => {
    // 1. 文字の書き換え
    title.textContent = checkbox.checked ? "light" : "dark";

    // 2. クラスの入れ替え（これなら他のクラスに影響しない）
    if (checkbox.checked) {
            body.classList.replace('dark', 'light');
    } else {
            body.classList.replace('light', 'dark');
    }
});
</script>
<script>
    // グローバル変数
    const canvas = document.getElementById('wallpaper-canvas');
    const viewport = document.getElementById('preview-viewport');
    const bgUpload = document.getElementById('bg-upload');

    // 1. 画像読み込み
    bgUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            canvas.style.backgroundImage = `url('${event.target.result}')`;
            fitToScreen();
        };
        reader.readAsDataURL(file);
    });

    // 2. カレンダー更新ロジック
    function update() {
        const year = parseInt(document.getElementById('year').value);
        const month = parseInt(document.getElementById('month').value);
        const calBody = document.getElementById('cal-body');
        const color = document.getElementById('color').value;
        const fontSize = document.getElementById('size-slider').value;
        const font = document.getElementById('font').value;

        // 追加：月齢表示の有無とサイズ
        const showMoon = document.getElementById('show-moon')?.checked ?? true;
        const moonSize = document.getElementById('moon-size')?.value ?? 32;

        // スタイル反映
        const area = document.getElementById('calendar-area');
        area.style.color = color;
        area.style.fontFamily = font;
        area.style.fontSize = fontSize + "px";

        // タイトル更新
        document.getElementById('year-num').textContent = year;
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('month-name').textContent = monthNames[month];

        // カレンダー計算
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const prevLastDate = new Date(year, month, 0).getDate();

        let html = "";
        let dateCount = 1 - firstDay;

        for (let i = 0; i < 6; i++) {
            html += "<tr>";
            for (let j = 0; j < 7; j++) {
                let displayDate, className = "";
                let targetDate; // 月齢計算用の正確な日付オブジェクト

                if (dateCount < 1) {
                    displayDate = prevLastDate + dateCount;
                    className = "other-month";
                    targetDate = new Date(year, month - 1, displayDate);
                } else if (dateCount > lastDate) {
                    displayDate = dateCount - lastDate;
                    className = "other-month";
                    targetDate = new Date(year, month + 1, displayDate);
                } else {
                    displayDate = dateCount;
                    targetDate = new Date(year, month, displayDate);
                    if (j === 0) className = "sun";
                    if (j === 6) className = "sat";
                }

                // 月齢タグの生成
                let moonTag = "";
                if (showMoon) {
                    // 簡易月齢計算（2000年1月6日の新月を基準とした近似値）
                    const baseDate = new Date(2000, 0, 6);
                    const diffDays = (targetDate - baseDate) / (1000 * 60 * 60 * 24);
                    const moonAge = diffDays % 29.53059;
                    const moonIndex = Math.floor(moonAge % 30); // 0-29の範囲に収める

                    // 画像が表示されない対策：パスが正しいか、コンソールで確認しろ
                    // Moon_0.png から Moon_29.png がフォルダにある前提やぞ
                    moonTag = `<img src="moon/Moon_${moonIndex}.png" class="moon-img" style="width:${moonSize}px;" onerror="console.error('Image not found: Moon_${moonIndex}.png')">`;
                }

                html += `<td class="${className}"><span class="date-num">${displayDate}</span>${moonTag}</td>`;
                dateCount++;
            }
            html += "</tr>";
            if (dateCount > lastDate && i >= 4) break;
        }
        calBody.innerHTML = html;
    }

    // 3. サイズ変更とスケーリング
    function changeSize(w, h) {
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";
        fitToScreen();
    }

    function fitToScreen() {
        const w = canvas.offsetWidth;
        const h = canvas.offsetHeight;
        const vW = viewport.clientWidth;
        const vH = viewport.clientHeight;
        if (!w || !h) return;
        const scale = Math.min(vW / w, vH / h) * 0.9;
        canvas.style.transform = `scale(${scale})`;
    }

    // 4. 配置切り替え
    function setPos(pos) {
        const area = document.getElementById('calendar-area');
        area.classList.remove('pos-top', 'pos-center', 'pos-bottom');
        area.classList.add(`pos-${pos}`);
        if(pos === 'top') { area.style.top = "10%"; area.style.bottom = "auto"; area.style.transform = "none"; }
        if(pos === 'center') { area.style.top = "50%"; area.style.transform = "translateY(-50%)"; }
        if(pos === 'bottom') { area.style.top = "auto"; area.style.bottom = "10%"; area.style.transform = "none"; }
    }

    window.onload = () => { update(); fitToScreen(); };
    window.onresize = fitToScreen;

    function applyQuickColor(hex) {
        const colorPicker = document.getElementById('color');
        colorPicker.value = hex; // カラーピッカーの値を更新
        update(); // カレンダーを再描画
    }
</script>
<script>
    // もしこういう処理があるなら、backgroundColorを明示的にnullにする
        html2canvas(document.querySelector("#wallpaper-canvas"), {
            backgroundColor: null,
            // ...他のオプション
        }).then(canvas => {
            // 保存処理
        });
    async function saveWallpaper() {
        const canvasElement = document.getElementById('wallpaper-canvas');
        const saveBtn = event.target;

        // 二重クリック防止
        saveBtn.innerText = "生成中...";
        saveBtn.disabled = true;

        // 1. スケーリングを一時解除（これをせんとボケボケになる）
        const originalTransform = canvasElement.style.transform;
        canvasElement.style.transform = 'none';

        try {
            // 2. html2canvasでキャプチャ
            const canvas = await html2canvas(canvasElement, {
                useCORS: true, // 画像の外部読み込み対策
                scale: 1,      // 元のサイズで書き出し
                logging: false,
            });

            // 3. ダウンロード処理
            const link = document.createElement('a');
            const year = document.getElementById('year').value;
            const month = document.getElementById('month').value;
            link.download = `Wallpaper_${year}_${parseInt(month)+1}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        } catch (err) {
            console.error("生成に失敗したわ：", err);
            alert("画像の生成に失敗したぞ。コンソールを見ろ。");
        } finally {
            // 4. スケーリングを戻す
            canvasElement.style.transform = originalTransform;
            saveBtn.innerText = "画像を保存する";
            saveBtn.disabled = false;
        }
    }
</script>
</html>
